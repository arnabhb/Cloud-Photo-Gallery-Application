{% extends "base.html" %}{% block content %}<h1>Photo results for “{{ searchquery }}”</h1><a href="{{ url_for('view_photos', album_id=albumID) }}">Return to album</a><div class="row g-4 mt-1">{% for photo in photos %}<div class="col-md-6 col-lg-4"><div class="card h-100"><img class="card-img-top gallery-cover" src="{{ photo.photoURL }}" alt="{{ photo.title }}"><div class="card-body"><h2 class="h5"><a href="{{ url_for('view_photo', album_id=photo.albumID, photo_id=photo.photoID) }}">{{ photo.title }}</a></h2><p>{{ photo.description }}</p></div></div></div>{% else %}<p>No matching photos</p>{% endfor %}</div>{% endblock %}
