{% extends "base.html" %}{% block title %}Login · Photo Gallery{% endblock %}{% block content %}
<div class="auth-card card shadow-sm mx-auto"><div class="card-body p-4">
<h1 class="h3 mb-3">Login</h1>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post" action="{{ url_for('login_page') }}">
  <label class="form-label" for="email">Email</label><input class="form-control mb-3" id="email" name="email" type="email" required>
  <label class="form-label" for="password">Password</label><input class="form-control mb-3" id="password" name="password" type="password" required>
  <button class="btn btn-primary w-100" type="submit">Login</button>
</form><p class="mt-3 mb-0">New user? <a href="{{ url_for('signup_page') }}">Create an account</a></p>
</div></div>{% endblock %}
