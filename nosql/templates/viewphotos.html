{% extends "base.html" %}{% block content %}<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"><div><h1>{{ albumName }}</h1><a href="{{ url_for('add_photo', album_id=albumID) }}">Add photo</a></div><form class="d-flex" method="get" action="{{ url_for('search_photo_page', album_id=albumID) }}"><input class="form-control me-2" name="query" placeholder="Search photos" required><button class="btn btn-outline-primary">Search</button></form></div><div class="row g-4">{% for photo in photos %}<div class="col-md-6 col-lg-4"><div class="card h-100 shadow-sm"><a href="{{ url_for('view_photo', album_id=photo.albumID, photo_id=photo.photoID) }}"><img class="card-img-top gallery-cover" src="{{ photo.photoURL }}" alt="{{ photo.title }}"></a><div class="card-body"><h2 class="h5">{{ photo.title }}</h2><p>{{ photo.description }}</p><small class="text-muted">Uploaded by {{ photo.user }}</small></div></div></div>{% else %}<p>No photos are available</p>{% endfor %}</div><hr class="my-5"><form method="post" onsubmit="return confirm('Delete this album and all of its photos?')"><button class="btn btn-outline-danger">Delete album</button></form>{% endblock %}
