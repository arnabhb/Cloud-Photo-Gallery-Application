{% extends "base.html" %}{% block content %}<h1>Album results for “{{ searchquery }}”</h1><div class="row g-4 mt-1">{% for album in albums %}<div class="col-md-6 col-lg-4"><div class="card h-100"><img class="card-img-top gallery-cover" src="{{ album.thumbnailURL }}" alt="{{ album.name }}"><div class="card-body"><h2 class="h5"><a href="{{ url_for('view_photos', album_id=album.albumID) }}">{{ album.name }}</a></h2><p>{{ album.description }}</p></div></div></div>{% else %}<p>No matching albums</p>{% endfor %}</div>{% endblock %}
