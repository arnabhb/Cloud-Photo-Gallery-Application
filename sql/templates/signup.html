{% extends "base.html" %}{% block title %}Sign up · Photo Gallery{% endblock %}{% block content %}
<div class="auth-card card shadow-sm mx-auto"><div class="card-body p-4">
<h1 class="h3 mb-3">Create account</h1>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post" action="{{ url_for('signup_page') }}">
  <label class="form-label" for="name">Full name</label><input class="form-control mb-3" id="name" name="name" required>
  <label class="form-label" for="email">Email</label><input class="form-control mb-3" id="email" name="email" type="email" required>
  <label class="form-label" for="password">Password</label><input class="form-control mb-3" id="password" name="password" type="password" minlength="8" required>
  <label class="form-label" for="password1">Repeat password</label><input class="form-control mb-3" id="password1" name="password1" type="password" minlength="8" required>
  <button class="btn btn-primary w-100" type="submit">Sign up</button>
</form><p class="mt-3 mb-0"><a href="{{ url_for('login_page') }}">Return to login</a></p>
</div></div>{% endblock %}
