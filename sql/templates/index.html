{% extends "base.html" %}{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
  <div><h1 class="mb-1">Albums</h1><p class="text-muted mb-0">Logged in as {{ user_name }}</p></div>
  <form class="d-flex" method="get" action="{{ url_for('search_album_page') }}"><input class="form-control me-2" name="query" placeholder="Search albums" required><button class="btn btn-outline-primary">Search</button></form>
</div>
<div class="row g-4">{% for album in albums %}<div class="col-md-6 col-lg-4"><div class="card h-100 shadow-sm"><a href="{{ url_for('view_photos', album_id=album.albumID) }}"><img class="card-img-top gallery-cover" src="{{ album.thumbnailURL }}" alt="{{ album.name }}"></a><div class="card-body"><h2 class="h5"><a class="text-decoration-none" href="{{ url_for('view_photos', album_id=album.albumID) }}">{{ album.name }}</a></h2><p>{{ album.description }}</p><small class="text-muted">Created {{ album.createdAt }} by {{ album.user }}</small></div></div></div>{% else %}<p>No albums are available</p>{% endfor %}</div>
<hr class="my-5"><form method="post" action="{{ url_for('home_page') }}" onsubmit="return confirm('Delete your account and all owned media?')"><button class="btn btn-outline-danger">Delete account</button></form>
{% endblock %}
