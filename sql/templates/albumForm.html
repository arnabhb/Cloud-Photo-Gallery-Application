{% extends "base.html" %}{% block content %}<div class="form-card card shadow-sm mx-auto"><div class="card-body p-4"><h1 class="h3">Create album</h1><form method="post" enctype="multipart/form-data"><label class="form-label">Name</label><input class="form-control mb-3" name="name" required><label class="form-label">Description</label><textarea class="form-control mb-3" name="description" rows="3" required></textarea><label class="form-label">Thumbnail</label><input class="form-control mb-3" type="file" name="imagefile" accept=".png,.jpg,.jpeg" required><button class="btn btn-primary">Create album</button></form></div></div>{% endblock %}
