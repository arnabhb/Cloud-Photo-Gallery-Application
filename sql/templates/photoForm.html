{% extends "base.html" %}{% block content %}<div class="form-card card shadow-sm mx-auto"><div class="card-body p-4"><h1 class="h3">Add photo to {{ albumName }}</h1><form method="post" enctype="multipart/form-data"><label class="form-label">Image</label><input class="form-control mb-3" type="file" name="imagefile" accept=".png,.jpg,.jpeg" required><label class="form-label">Title</label><input class="form-control mb-3" name="title" required><label class="form-label">Description</label><textarea class="form-control mb-3" name="description" rows="3"></textarea><label class="form-label">Tags</label><input class="form-control mb-3" name="tags" placeholder="travel, sunset, city"><button class="btn btn-primary">Upload photo</button></form></div></div>{% endblock %}
