AWSTemplateFormatVersion: "2010-09-09"
Description: AWS infrastructure for SQL and NoSQL photo gallery applications

Parameters:
  PhotoBucketName:
    Type: String
  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  SSHLocation:
    Type: String
    Default: 0.0.0.0/0
    Description: Restrict this CIDR to the administrator public IP whenever possible

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
  InternetGateway:
    Type: AWS::EC2::InternetGateway
  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
  RouteAssociationA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable
  RouteAssociationB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable
  ApplicationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Application and administration access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 22, ToPort: 22, CidrIp: !Ref SSHLocation}
        - {IpProtocol: tcp, FromPort: 5000, ToPort: 5001, CidrIp: 0.0.0.0/0}
  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MySQL access from the application instance only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref ApplicationSecurityGroup
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for the photo gallery database
      SubnetIds: [!Ref PublicSubnetA, !Ref PublicSubnetB]
  PhotoDatabase:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: photogallerydb
      DBName: photogallerydb
      Engine: mysql
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp3
      MasterUsername: photoapp
      MasterUserPassword: !Ref DBMasterPassword
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 7
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: [!Ref DatabaseSecurityGroup]
  PhotoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: photogallerydb
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - {AttributeName: albumID, AttributeType: S}
        - {AttributeName: photoID, AttributeType: S}
      KeySchema:
        - {AttributeName: albumID, KeyType: HASH}
        - {AttributeName: photoID, KeyType: RANGE}
  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: photogalleryusers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - {AttributeName: UserID, AttributeType: S}
      KeySchema:
        - {AttributeName: UserID, KeyType: HASH}
  PhotoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref PhotoBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: {SSEAlgorithm: AES256}
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
  PhotoBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PhotoBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${PhotoBucket.Arn}/*"
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PhotoGalleryApplicationAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject, s3:DeleteObject]
                Resource: !Sub "${PhotoBucket.Arn}/*"
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:Query, dynamodb:Scan]
                Resource: [!GetAtt PhotoTable.Arn, !GetAtt UserTable.Arn]
              - Effect: Allow
                Action: ses:SendEmail
                Resource: "*"
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]
  ApplicationInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds: [!Ref ApplicationSecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - {Key: Name, Value: PhotoGalleryApplication}

Outputs:
  EC2PublicDNS:
    Value: !GetAtt ApplicationInstance.PublicDnsName
  RDSEndpoint:
    Value: !GetAtt PhotoDatabase.Endpoint.Address
  S3BucketName:
    Value: !Ref PhotoBucket
  PhotoTableName:
    Value: !Ref PhotoTable
  UserTableName:
    Value: !Ref UserTable
